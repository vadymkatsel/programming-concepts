project:
  type: website
  output-dir: docs
  resources:
    - "index.html"
    - "index.css"
    - "style.css"
    - "script.js"
    - "sources/"
    - "courses/**/sources/"

execute:
  freeze: auto

website: 
  title: "Programming Concepts Course"
  page-footer: 
    center: "© 2025 Vadym Katsel. All rights reserved."
  site-url: "https://vadymkatsel.github.io/programming-concepts"
  repo-url: "https://github.com/vadymkatsel/programming-concepts"

  navbar:
      logo: sources/logo.svg
      right:
        - href: courses/ebd-course/modules/index.qmd
          text: "Економіка & Великі дані"
        - href: courses/math-course/modules/index.qmd
          text: "Математика"
        - href: courses/be-course/modules/index.qmd
          text: "Бізнес Економіка"

  
  sidebar:
    - id: math-sidebar
      title: "Зміст курсу"
      search: true 
      collapse-level: 1
      contents:
        - courses/math-course/modules/index.qmd 
        
        - section: "Змінні, типи даних. Математичні операції в Python"
          contents:
            - courses/math-course/modules/variables-data-types-operations-practice.qmd
        
        - section: "Списки"
          contents:
            - courses/math-course/modules/lists-practice.qmd

        - section: "Функції"
          contents:
            - courses/math-course/modules/functions-practice.qmd 

        - section: "Основи Git"
          contents:
            - courses/math-course/modules/git-practice.qmd

        - section: "Словники. List Comprehension"
          contents:
            - courses/math-course/modules/dictionaries-lc-practice.qmd
        
        - section: "Базова робота з файлами. Обробка помилок"
          contents:
            - courses/math-course/modules/file-basics-error-handling-practice.qmd

        - section: "Обробка даних з JSON та CSV"
          contents:
            - courses/math-course/modules/json-csv-basics.qmd

        - section: "Вступ до ООП"
          contents:
            - courses/math-course/modules/intro-to-oop/intro-to-oop-practice.qmd

        - section: "Базова робота з бібліотеками"
          contents:
            - courses/math-course/modules/libraries/pandas-matplotlib-practice.qmd
            - courses/math-course/modules/libraries/numpy-practice.qmd
            
      active-modes: [courses/math-course]

    - id: be-sidebar
      search: true 
      collapse-level: 1
      contents:
        - courses/be-course/modules/index.qmd 
  
        - section: "Змінні, типи даних. Математичні операції в Python"
          contents: 
            - courses/be-course/modules/variables-data-types-operations-practice.qmd
            
        - section: "Логічні розгалудження"
          contents: 
            - courses/be-course/modules/conditionals-practice.qmd
            - courses/be-course/modules/ATM-simulator-task.qmd

        - section: "Списки та словники"
          contents: 
            - courses/be-course/modules/lists-practice.qmd
            - courses/be-course/modules/dictionaries-tuples-sets-practice.qmd
            - courses/be-course/modules/comprehensions-practice.qmd

        - section: "Рядки"
          contents:
            - courses/be-course/modules/strings-practice.qmd

        - section: "Функції"
          contents: 
            - courses/be-course/modules/functions-practice.qmd

        - section: "Робота з файлами"
          contents: 
            - courses/be-course/modules/files-practice.qmd

        - section: "Бібліотеки, JSON"
          contents: 
            - courses/be-course/modules/libraries-json-practice.qmd

      active-modes: [courses/be-course]

    - id: ebd-sidebar
      search: true 
      collapse-level: 1
      contents:
        - courses/ebd-course/modules/index.qmd 
        # - section: "Середовище програмування. Основи Python"
        #   contents:
        #     - 

      active-modes: [courses/ebd-course]

format:
  typst:
    toc: true
    number-sections: false
  html:
    format-links: false
    other-links:
      - text: "Завантажити PDF"
        icon: file-pdf
        href: index.pdf
    theme: 
      dark: darkly
      light: cosmo
    mainfont: 'Lilex'
    css: style.css
    number-sections: false
    favicon: sources/favicon.svg
    include-in-header:
      - text: |
          <link rel="icon" type="image/svg+xml" href="https://vadymkatsel.github.io/programming-concepts/sources/favicon.svg">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      - file: analytics.html
    include-after-body:
      text: |
        <script src="/script.js"></script>


